<!DOCTYPE html>
<html>
<head>
    <title>Medical Report Generator</title>
</head>
<body>
    <h2>AI Medical Report Generator</h2>

    <form action="/generate" method="post">

        <h3>Patient Details</h3>
        Age: <input type="number" name="age"><br>
        Gender: <input type="text" name="gender"><br>
        Height: <input type="number" name="height"><br>
        Weight: <input type="number" name="weight"><br>
        Blood Group: <input type="text" name="blood_group"><br>

        <h3>Symptoms</h3>
        Fever: <input type="number" name="fever"><br>
        Cough: <input type="number" name="cough"><br>

        <h3>Vital Signs</h3>
        BP: <input type="number" name="bp"><br>
        Temperature: <input type="number" name="temp"><br>

        <input type="submit" value="Generate Report">
    </form>

</body>
</html>
